<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity & Status Logs - Ang Thong ABM</title>
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .glass-premium { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .gradient-admin { background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%); }
        
        /* DataTables Custom Styling */
        .dataTables_wrapper { font-family: 'Sarabun', sans-serif; }
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter, .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_paginate { padding: 12px 0; font-size: 14px; color: #4b5563; }
        .dataTables_wrapper .dataTables_filter input { border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 12px; margin-left: 8px; outline: none; transition: all 0.2s; }
        .dataTables_wrapper .dataTables_filter input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .dataTables_wrapper .dataTables_length select { border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px 24px 6px 8px; outline: none; }
        .dataTables_wrapper .dataTables_paginate .paginate_button { border: 1px solid #e5e7eb !important; border-radius: 8px !important; padding: 6px 12px !important; margin: 0 2px !important; background: white !important; color: #374151 !important; }
        .dataTables_wrapper .dataTables_paginate .paginate_button:hover { background: #eef2ff !important; border-color: #4f46e5 !important; color: #4338ca !important; }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current { background: linear-gradient(135deg, #6366f1, #4f46e5) !important; border-color: #4f46e5 !important; color: white !important; }
        table.dataTable thead th { background: linear-gradient(135deg, #f8fafc, #f1f5f9) !important; color: #334155 !important; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #cbd5e1 !important; padding: 12px 16px !important; }
        table.dataTable tbody tr { transition: all 0.15s; }
        table.dataTable tbody tr:hover { background: #f8fafc !important; }
        table.dataTable tbody td { padding: 12px 16px !important; vertical-align: middle; border-bottom: 1px solid #f1f5f9 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Header -->
    <header class="glass-premium sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 gradient-admin rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-history text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-800">System Logs</h1>
                        <p class="text-xs text-slate-500">ประวัติการใช้งานและการเปลี่ยนแปลง (Activity & Status History)</p>
                    </div>
                </div>
                <div>
                    <a href="index.html" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">
                        <i class="fas fa-arrow-left mr-1.5"></i> กลับหน้าแรก
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative">
        <div class="mb-6 flex justify-between items-end" data-aos="fade-down">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">บันทึกการทำงานของระบบ</h2>
                <p class="text-slate-500 mt-1">แสดงประวัติการอัปเดตจาก <span class="font-bold">หน้าต่างรายละเอียด (Status)</span> และ <span class="font-bold">การสร้าง/ลบแก้ไข (Activity)</span></p>
            </div>
            <button onclick="fetchLogs()" class="px-4 py-2 bg-white border border-slate-200 shadow-sm rounded-lg text-sm text-slate-600 hover:bg-slate-50 hover:text-indigo-600 transition-all">
                <i class="fas fa-sync-alt mr-1"></i> รีเฟรชข้อมูล
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden" data-aos="fade-up" data-aos-delay="100">
            <div class="p-6">
                <table id="logsTable" class="w-full text-left display responsive nowrap" style="width:100%">
                    <thead>
                        <tr>
                            <th>วัน/เวลา</th>
                            <th>แหล่งที่มา</th>
                            <th>ผู้ใช้งาน</th>
                            <th>แพตเทิร์น / การกระทำ</th>
                            <th>ฝ่าย</th>
                            <th>รายละเอียด (ความเปลี่ยนแปลง)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be populated by DataTables via AJAX -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="libs/aos/aos.js"></script>
    
    <!-- Include app context to verify login (optional but good practice) -->
    <script>
        AOS.init({ duration: 600, once: true });

        // Initialize DataTable
        let dataTable;

        function fetchLogs() {
            if(dataTable) {
                dataTable.ajax.reload();
                return;
            }

            dataTable = $('#logsTable').DataTable({
                ajax: {
                    url: 'api/system_logs.php',
                    dataSrc: ''
                },
                columns: [
                    { 
                        data: 'log_date',
                        render: function(data, type, row) {
                            if (!data) return '-';
                            if (type === 'display') {
                                const d = new Date(data);
                                return `<div class="font-medium text-slate-700">${d.toLocaleDateString('th-TH')}</div><div class="text-xs text-slate-400">${d.toLocaleTimeString('th-TH')}</div>`;
                            }
                            return data; // for sorting
                        }
                    },
                    { 
                        data: 'log_type',
                        render: function(data, type, row) {
                            const isStatus = data.includes("Status");
                            const color = isStatus ? 'emerald' : 'indigo';
                            return `<span class="px-2 py-1 bg-${color}-50 text-${color}-600 rounded-md text-[10px] font-bold border border-${color}-100 whitespace-nowrap"><i class="fas ${isStatus ? 'fa-tag' : 'fa-list'} mr-1"></i> ${data}</span>`;
                        }
                    },
                    { 
                        data: 'user',
                        render: function(data) {
                            return `<div class="flex items-center gap-2"><div class="w-6 h-6 rounded bg-slate-100 flex items-center justify-center"><i class="fas fa-user text-slate-400 text-[10px]"></i></div><span class="text-sm font-semibold">${data || 'ระบบ'}</span></div>`;
                        }
                    },
                    { 
                        data: 'action',
                        render: function(data) {
                            const actionMap = {
                                'ADD': { text: 'เพิ่มข้อมูล', color: 'green' },
                                'UPDATE': { text: 'อัปเดตข้อมูล', color: 'blue' },
                                'DELETE': { text: 'ลบข้อมูล', color: 'rose' },
                                'อัปเดตสถานะ': { text: 'อัปเดตสถานะ', color: 'amber' },
                                'อัปเดตข้อมูลทั่วไป': { text: 'อัปเดตข้อมูลอื่นๆ', color: 'teal' }
                            };
                            const mapping = actionMap[data] || { text: data, color: 'slate' };
                            return `<span class="text-xs font-bold text-${mapping.color}-600 bg-${mapping.color}-50 px-2 py-1 rounded border border-${mapping.color}-100 uppercase">${mapping.text}</span>`;
                        }
                    },
                    { 
                        data: 'module',
                        render: function(data) {
                            const deptMap = {
                                'survey': { text: 'รังวัด', icon: 'fa-map-marked-alt', color: 'text-indigo-600' },
                                'registration': { text: 'ทะเบียน', icon: 'fa-folder-open', color: 'text-blue-600' },
                                'academic': { text: 'วิชาการ', icon: 'fa-book-reader', color: 'text-orange-600' },
                                'admin': { text: 'อำนวยการ', icon: 'fa-building', color: 'text-teal-600' }
                            };
                            const mapping = deptMap[data] || { text: data, icon: 'fa-cube', color: 'text-slate-500' };
                            return `<div class="flex items-center text-sm font-medium ${mapping.color}"><i class="fas ${mapping.icon} mr-1.5 opacity-75"></i><span>${mapping.text}</span></div>`;
                        }
                    },
                    { 
                        data: 'details',
                        render: function(data, type, row) {
                            if (!data) return '-';
                            // truncate long details for display, show full on hover
                            const truncated = data.length > 80 ? data.substring(0, 80) + '...' : data;
                            return `<div class="text-xs text-slate-600 max-w-md whitespace-normal break-words" title="${data.replace(/"/g, '&quot;')}">${data}</div>`;
                        }
                    }
                ],
                order: [[0, 'desc']], // Sort by date desc initially
                language: {
                    url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/th.json",
                },
                pageLength: 25,
                responsive: true
            });
        }

        $(document).ready(function() {
            // Check auth (simple)
            const user = localStorage.getItem('dol_user');
            if(!user) {
                window.location.href = 'index.html';
            } else {
                try {
                    const userData = JSON.parse(user);
                    if(userData.role !== 'superadmin' && userData.role !== 'admin') {
                        alert('ไม่มีสิทธิ์เข้าถึงหน้านี้');
                        window.location.href = 'index.html';
                    } else {
                        fetchLogs();
                    }
                } catch(e) {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
